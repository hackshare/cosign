# cargo-deny configuration.  Run: `cargo deny check` (from core/).
#
# The advisories accepted below are transitive dependencies of the pinned
# Solana 1.18 ecosystem (solana-*, anchor-*, spl-*), which is locked for
# curve25519-dalek 3 compatibility. None are fixable without the Solana 2.x
# migration. The networking advisories (quinn / ring / rustls-webpki) are
# unreachable in this relay-only signer: the app never opens a QUIC connection
# or parses X.509 certificates itself — all RPC goes over system HTTPS to the
# relay. Each entry is re-reviewed when the Solana pin moves.

[advisories]
# Unmaintained is informational noise for this project: the pinned Solana 1.18
# tree (and our own bincode 1.x) drags in many unmaintained crates we can't bump
# without the 2.x migration. Keep CI focused on actual vulnerabilities; flip this
# back on when the Solana pin moves.
unmaintained = "none"
ignore = [
    # Crypto — inherent to Solana 1.18's dalek 3.x. Signing goes through the
    # audited solana_sdk::signer::keypair::Keypair, not these APIs directly.
    "RUSTSEC-2024-0344", # curve25519-dalek 3.2.1: timing variability in Scalar sub
    "RUSTSEC-2022-0093", # ed25519-dalek 1.0.1: double-pubkey signing oracle
    # Networking (solana-quic-client QUIC/TLS) — never exercised; relay-only app.
    "RUSTSEC-2026-0185", # quinn-proto 0.10.6: out-of-order reassembly memory exhaustion
    "RUSTSEC-2026-0037", # quinn-proto 0.10.6: endpoint denial of service
    "RUSTSEC-2025-0009", # ring 0.16.20: AES panic under overflow checks
    "RUSTSEC-2026-0104", # rustls-webpki 0.101.7: CRL parsing panic
    "RUSTSEC-2026-0098", # rustls-webpki 0.101.7: URI name constraints accepted
    "RUSTSEC-2026-0099", # rustls-webpki 0.101.7: wildcard name constraints accepted
]

[bans]
# The Solana / anchor / spl tree pulls many crates at multiple versions
# (borsh, base64, bitflags, ...). Not dedupable without upstream changes.
multiple-versions = "allow"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
    "Unlicense",
]
