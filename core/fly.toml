# Cosign devnet relay. Deploy: `cd core && fly deploy`.
# Required secret: fly secrets set COSIGN_RELAY_RPC_URL="https://devnet.helius-rpc.com/?api-key=..."
# (The relay proxies + filters RPC and serves the cosign/v1 endpoints + Jupiter prices.)
#
# Topology: two machines spread across sjc + iad, both kept warm (the membership
# indexer holds a live programSubscribe on each, so machines must not auto-stop).
#   fly scale count 2 --region sjc,iad
app = "cosign-relay-devnet"
primary_region = "sjc"

[build]

# The devnet relay is not the canonical marketing host. Redirect its landing
# paths (/, /privacy, /favicon.svg, /assets/*) to the single canonical site;
# its RPC/API role for devnet Solana is unaffected.
[env]
  COSIGN_LANDING_REDIRECT = "https://cosign.hackshare.com"
  COSIGN_INDEX_DB_PATH = "/data/membership-index.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  min_machines_running = 2

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/_health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "cosign_index"
  destination = "/data"
