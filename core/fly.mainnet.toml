# Cosign mainnet relay. Deploy: `cd core && fly deploy -c fly.mainnet.toml`.
# First-time setup:
#   fly apps create cosign-relay-mainnet
#   fly secrets set COSIGN_RELAY_RPC_URL="https://mainnet.helius-rpc.com/?api-key=..." -a cosign-relay-mainnet
# (The relay binary is unchanged from the devnet build; only the app name and the
# upstream RPC secret differ. It proxies + filters RPC and serves the cosign/v1
# endpoints + Jupiter prices. The Helius mainnet key lives ONLY in the Fly secret,
# never in the repo.)
#
# Topology: two machines spread across sjc + iad, both kept warm (the membership
# indexer holds a live programSubscribe on each, so machines must not auto-stop).
#   fly scale count 2 --region sjc,iad -a cosign-relay-mainnet
app = "cosign-relay-mainnet"
primary_region = "sjc"

[env]
  COSIGN_INDEX_DB_PATH = "/data/membership-index.db"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  min_machines_running = 2

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/_health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "cosign_index"
  destination = "/data"
