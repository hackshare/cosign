name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust core
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: core

      - name: rustfmt --check
        working-directory: core
        run: cargo fmt --all -- --check

      - name: clippy
        working-directory: core
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        working-directory: core
        run: cargo test

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          manifest-path: core/Cargo.toml
          command: check advisories bans

  ios:
    name: iOS app + tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: core

      # The XCFramework + UniFFI bindings are derived purely from core/. Cache
      # them keyed on the Rust sources so iOS-only changes skip the Rust rebuild.
      - name: Cache XCFramework + bindings
        id: xcframework
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            Modules/CosignCore/Frameworks/CosignCore.xcframework
            Modules/CosignCore/Sources/Generated
          key: xcframework-${{ runner.os }}-${{ hashFiles('core/src/**', 'core/Cargo.toml', 'core/Cargo.lock', 'core/build.rs', 'core/uniffi.toml', 'scripts/build-rust.sh', 'scripts/build-xcframework.sh') }}

      - name: Build XCFramework
        if: steps.xcframework.outputs.cache-hit != 'true'
        run: ./scripts/build-xcframework.sh

      - name: Install Tuist + Swift lint tooling
        run: brew install tuist swiftformat swiftlint

      - name: swiftformat --lint
        run: swiftformat --lint App/ Modules/

      - name: swiftlint
        run: swiftlint lint --quiet --strict App Modules

      - name: Generate Xcode project
        run: tuist generate --no-open

      - name: Build app
        run: |
          xcodebuild \
            -workspace Cosign.xcworkspace \
            -scheme Cosign \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -E "    iPhone [0-9]+" | head -1 | sed 's/^[ \t]*//' | sed 's/ (.*//')
          echo "Selected simulator: $DEVICE"
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Run tests
        env:
          SIMULATOR_NAME: ${{ steps.sim.outputs.device }}
        run: |
          xcodebuild test \
            -workspace Cosign.xcworkspace \
            -scheme Cosign-Workspace \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME,OS=latest" \
            -retry-tests-on-failure \
            -test-iterations 3
